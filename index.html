<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>chat</title>
  <script src="https://unpkg.com/@supabase/supabase-js@2"></script>

  <!--
  ╔══════════════════════════════════════════════════════╗
  ║  SUPABASE SETUP                                      ║
  ║                                                      ║
  ║  1. Create a project at https://supabase.com         ║
  ║  2. Run this SQL in the SQL Editor:                  ║
  ║                                                      ║
  ║     create table messages (                          ║
  ║       id bigint generated always as identity         ║
  ║             primary key,                             ║
  ║       username text not null,                        ║
  ║       content  text not null,                        ║
  ║       created_at timestamptz default now()           ║
  ║     );                                               ║
  ║     alter table messages enable row level security;  ║
  ║     create policy "public read"                      ║
  ║       on messages for select using (true);           ║
  ║     create policy "public insert"                    ║
  ║       on messages for insert with check (true);      ║
  ║                                                      ║
  ║  3. Go to Database → Replication, enable             ║
  ║     Realtime for the "messages" table                ║
  ║  4. Paste your URL and anon key below                ║
  ╚══════════════════════════════════════════════════════╝
  -->

  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:        #0c0c0c;
      --surface:   #141414;
      --border:    #252525;
      --text:      #e8e4dc;
      --muted:     #5a5650;
      --accent:    #c9a84c;
      --accent-dim:#7a6028;
      --self-bg:   #1a1710;
      --font:      'JetBrains Mono', ui-monospace, 'Courier New', monospace;
      --radius:    6px;
    }

    html, body {
      height: 100%;
      background: var(--bg);
      color: var(--text);
      font-family: var(--font);
      font-size: 13px;
      line-height: 1.6;
      -webkit-font-smoothing: antialiased;
    }

    /* ── Login overlay ── */
    #login-screen {
      position: fixed; inset: 0;
      display: flex; align-items: center; justify-content: center;
      background: var(--bg);
      z-index: 100;
    }
    #login-screen.hidden { display: none; }

    .login-box {
      width: 320px;
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 2rem;
    }
    .login-box h1 {
      font-size: 13px;
      font-weight: 500;
      letter-spacing: 0.08em;
      color: var(--accent);
      margin-bottom: 1.5rem;
    }
    .login-box label {
      display: block;
      font-size: 11px;
      color: var(--muted);
      letter-spacing: 0.06em;
      margin-bottom: 6px;
    }
    .login-box input {
      width: 100%;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      color: var(--text);
      font-family: var(--font);
      font-size: 13px;
      padding: 8px 10px;
      outline: none;
      transition: border-color 0.15s;
    }
    .login-box input:focus { border-color: var(--accent-dim); }
    .login-box button {
      margin-top: 1.25rem;
      width: 100%;
      background: transparent;
      border: 1px solid var(--accent-dim);
      border-radius: var(--radius);
      color: var(--accent);
      font-family: var(--font);
      font-size: 12px;
      letter-spacing: 0.06em;
      padding: 8px;
      cursor: pointer;
      transition: background 0.15s, border-color 0.15s;
    }
    .login-box button:hover {
      background: var(--self-bg);
      border-color: var(--accent);
    }
    .login-error {
      margin-top: 10px;
      font-size: 11px;
      color: #a05050;
      display: none;
    }

    /* ── Chat layout ── */
    #app {
      display: none;
      flex-direction: column;
      height: 100dvh;
    }
    #app.visible { display: flex; }

    header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 14px 20px;
      border-bottom: 1px solid var(--border);
      flex-shrink: 0;
    }
    .header-left {
      display: flex; align-items: center; gap: 10px;
    }
    .dot {
      width: 7px; height: 7px;
      border-radius: 50%;
      background: var(--accent);
      flex-shrink: 0;
    }
    .dot.offline { background: var(--muted); }
    header h2 {
      font-size: 12px;
      font-weight: 500;
      letter-spacing: 0.1em;
      color: var(--accent);
    }
    .header-user {
      font-size: 11px;
      color: var(--muted);
      letter-spacing: 0.05em;
    }

    /* ── Messages ── */
    #messages {
      flex: 1;
      overflow-y: auto;
      padding: 20px;
      display: flex;
      flex-direction: column;
      gap: 2px;
      scroll-behavior: smooth;
    }
    #messages::-webkit-scrollbar { width: 4px; }
    #messages::-webkit-scrollbar-track { background: transparent; }
    #messages::-webkit-scrollbar-thumb {
      background: var(--border);
      border-radius: 2px;
    }

    .msg {
      display: grid;
      grid-template-columns: 90px 1fr;
      gap: 0 14px;
      padding: 3px 0;
      border-radius: var(--radius);
      transition: background 0.1s;
    }
    .msg:hover { background: var(--surface); }
    .msg.self { background: var(--self-bg); }
    .msg.self:hover { background: var(--self-bg); filter: brightness(1.08); }

    .msg-meta {
      display: flex;
      flex-direction: column;
      align-items: flex-end;
      padding: 3px 0 3px 10px;
      gap: 2px;
      flex-shrink: 0;
    }
    .msg-user {
      font-size: 11px;
      font-weight: 500;
      color: var(--accent);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      max-width: 88px;
      text-align: right;
    }
    .msg.self .msg-user { color: #8eb87a; }
    .msg-time {
      font-size: 10px;
      color: var(--muted);
      letter-spacing: 0.02em;
    }
    .msg-body {
      padding: 3px 10px 3px 0;
      color: var(--text);
      word-break: break-word;
      white-space: pre-wrap;
    }

    /* date divider */
    .date-divider {
      display: flex;
      align-items: center;
      gap: 10px;
      margin: 12px 0 8px;
      color: var(--muted);
      font-size: 10px;
      letter-spacing: 0.08em;
    }
    .date-divider::before, .date-divider::after {
      content: '';
      flex: 1;
      height: 1px;
      background: var(--border);
    }

    .status-line {
      text-align: center;
      font-size: 11px;
      color: var(--muted);
      padding: 8px 0;
      letter-spacing: 0.04em;
    }

    /* ── Input area ── */
    #input-area {
      border-top: 1px solid var(--border);
      padding: 14px 20px;
      display: flex;
      gap: 10px;
      align-items: flex-end;
      flex-shrink: 0;
    }
    #msg-input {
      flex: 1;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      color: var(--text);
      font-family: var(--font);
      font-size: 13px;
      padding: 8px 10px;
      resize: none;
      outline: none;
      max-height: 120px;
      min-height: 36px;
      line-height: 1.6;
      transition: border-color 0.15s;
      overflow-y: auto;
    }
    #msg-input:focus { border-color: var(--accent-dim); }
    #msg-input::placeholder { color: var(--muted); }

    #send-btn {
      background: transparent;
      border: 1px solid var(--accent-dim);
      border-radius: var(--radius);
      color: var(--accent);
      font-family: var(--font);
      font-size: 16px;
      width: 36px; height: 36px;
      flex-shrink: 0;
      cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      transition: background 0.15s, border-color 0.15s;
      line-height: 1;
      padding-bottom: 1px;
    }
    #send-btn:hover {
      background: var(--self-bg);
      border-color: var(--accent);
    }
    #send-btn:disabled {
      opacity: 0.3;
      cursor: default;
    }

    .char-hint {
      font-size: 10px;
      color: var(--muted);
      align-self: center;
      flex-shrink: 0;
      min-width: 24px;
      text-align: right;
    }
  </style>
</head>
<body>

  <!-- ── Login ── -->
  <div id="login-screen">
    <div class="login-box">
      <h1>// chat</h1>
      <label for="username-input">username</label>
      <input
        id="username-input"
        type="text"
        maxlength="24"
        placeholder="enter a name"
        autocomplete="off"
        autofocus
      />
      <p class="login-error" id="login-error">please enter a username</p>
      <button id="join-btn">join →</button>
    </div>
  </div>

  <!-- ── App ── -->
  <div id="app">
    <header>
      <div class="header-left">
        <div class="dot" id="status-dot"></div>
        <h2>chat</h2>
      </div>
      <span class="header-user" id="header-user"></span>
    </header>

    <div id="messages">
      <div class="status-line" id="loading-line">connecting…</div>
    </div>

    <div id="input-area">
      <textarea
        id="msg-input"
        placeholder="message"
        maxlength="1000"
        rows="1"
        autocomplete="off"
      ></textarea>
      <span class="char-hint" id="char-count"></span>
      <button id="send-btn" disabled title="send (Enter)">↑</button>
    </div>
  </div>

  <script>
    // ┌─────────────────────────────────────────┐
    // │  REPLACE THESE WITH YOUR PROJECT VALUES │
    // └─────────────────────────────────────────┘
    const SUPABASE_URL      = 'https://YOUR_PROJECT_ID.supabase.co';
    const SUPABASE_ANON_KEY = 'YOUR_ANON_KEY';
    // ─────────────────────────────────────────

    const MAX_CHARS = 1000;
    const PAGE_SIZE = 80;

    let supabase, currentUser, subscription;

    // ── DOM refs ──────────────────────────────
    const loginScreen  = document.getElementById('login-screen');
    const usernameInput= document.getElementById('username-input');
    const joinBtn      = document.getElementById('join-btn');
    const loginError   = document.getElementById('login-error');

    const app          = document.getElementById('app');
    const headerUser   = document.getElementById('header-user');
    const statusDot    = document.getElementById('status-dot');
    const messagesEl   = document.getElementById('messages');
    const loadingLine  = document.getElementById('loading-line');
    const msgInput     = document.getElementById('msg-input');
    const sendBtn      = document.getElementById('send-btn');
    const charCount    = document.getElementById('char-count');

    // ── Helpers ───────────────────────────────
    function formatTime(ts) {
      return new Date(ts).toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
    }
    function formatDate(ts) {
      const d = new Date(ts);
      const today = new Date();
      if (d.toDateString() === today.toDateString()) return 'today';
      const yesterday = new Date(today); yesterday.setDate(today.getDate() - 1);
      if (d.toDateString() === yesterday.toDateString()) return 'yesterday';
      return d.toLocaleDateString([], { month: 'short', day: 'numeric', year: 'numeric' });
    }

    let lastDate = null;
    let atBottom = true;

    function isScrolledToBottom() {
      return messagesEl.scrollHeight - messagesEl.clientHeight - messagesEl.scrollTop < 60;
    }
    messagesEl.addEventListener('scroll', () => { atBottom = isScrolledToBottom(); });

    function scrollToBottom() {
      messagesEl.scrollTop = messagesEl.scrollHeight;
    }

    function renderMessage(msg, prepend = false) {
      const dateLabel = formatDate(msg.created_at);

      if (!prepend && dateLabel !== lastDate) {
        const div = document.createElement('div');
        div.className = 'date-divider';
        div.textContent = dateLabel;
        messagesEl.appendChild(div);
        lastDate = dateLabel;
      }

      const row = document.createElement('div');
      row.className = 'msg' + (msg.username === currentUser ? ' self' : '');
      row.dataset.id = msg.id;
      row.innerHTML = `
        <div class="msg-meta">
          <span class="msg-user">${escHtml(msg.username)}</span>
          <span class="msg-time">${formatTime(msg.created_at)}</span>
        </div>
        <div class="msg-body">${escHtml(msg.content)}</div>
      `;

      if (prepend) {
        messagesEl.prepend(row);
      } else {
        messagesEl.appendChild(row);
      }
    }

    function escHtml(s) {
      return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
    }

    // ── Load history ──────────────────────────
    async function loadHistory() {
      const { data, error } = await supabase
        .from('messages')
        .select('*')
        .order('created_at', { ascending: false })
        .limit(PAGE_SIZE);

      loadingLine.remove();

      if (error) {
        const err = document.createElement('div');
        err.className = 'status-line';
        err.style.color = '#a05050';
        err.textContent = 'could not load messages: ' + error.message;
        messagesEl.appendChild(err);
        return;
      }

      if (!data.length) {
        const note = document.createElement('div');
        note.className = 'status-line';
        note.textContent = 'no messages yet — say hello';
        messagesEl.appendChild(note);
      } else {
        const reversed = [...data].reverse();
        reversed.forEach(m => renderMessage(m));
      }

      scrollToBottom();
    }

    // ── Realtime ──────────────────────────────
    function subscribeRealtime() {
      subscription = supabase
        .channel('public:messages')
        .on(
          'postgres_changes',
          { event: 'INSERT', schema: 'public', table: 'messages' },
          ({ new: msg }) => {
            const shouldScroll = atBottom;
            renderMessage(msg);
            if (shouldScroll) scrollToBottom();
          }
        )
        .subscribe(status => {
          if (status === 'SUBSCRIBED') {
            statusDot.classList.remove('offline');
          } else {
            statusDot.classList.add('offline');
          }
        });
    }

    // ── Send message ──────────────────────────
    async function sendMessage() {
      const content = msgInput.value.trim();
      if (!content) return;

      sendBtn.disabled = true;
      msgInput.value = '';
      msgInput.style.height = 'auto';
      charCount.textContent = '';

      const { error } = await supabase
        .from('messages')
        .insert({ username: currentUser, content });

      if (error) {
        msgInput.value = content;
        autoResize();
        const note = document.createElement('div');
        note.className = 'status-line';
        note.style.color = '#a05050';
        note.textContent = 'failed to send: ' + error.message;
        messagesEl.appendChild(note);
        scrollToBottom();
      }

      sendBtn.disabled = false;
      msgInput.focus();
    }

    function autoResize() {
      msgInput.style.height = 'auto';
      msgInput.style.height = Math.min(msgInput.scrollHeight, 120) + 'px';
      const len = msgInput.value.length;
      charCount.textContent = len > MAX_CHARS - 100 ? len + '/' + MAX_CHARS : '';
      sendBtn.disabled = msgInput.value.trim().length === 0;
    }

    msgInput.addEventListener('input', autoResize);
    msgInput.addEventListener('keydown', e => {
      if (e.key === 'Enter' && !e.shiftKey) {
        e.preventDefault();
        if (!sendBtn.disabled) sendMessage();
      }
    });
    sendBtn.addEventListener('click', sendMessage);

    // ── Join ──────────────────────────────────
    function validateConfig() {
      return SUPABASE_URL !== 'https://uagbptlwxrmfdqtpbmwz.supabase.co' &&
             SUPABASE_ANON_KEY !== 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InVhZ2JwdGx3eHJtZmRxdHBibXd6Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODAyNzYyOTgsImV4cCI6MjA5NTg1MjI5OH0.oM94DGrGOng9x9XqQdxS-W8UkQRhRyMxAjcCxbhcdss';
    }

    joinBtn.addEventListener('click', join);
    usernameInput.addEventListener('keydown', e => { if (e.key === 'Enter') join(); });

    function showLoginError(msg) {
      loginError.textContent = msg;
      loginError.style.display = 'block';
    }

    async function join() {
      const name = usernameInput.value.trim();
      if (!name) {
        showLoginError('please enter a username');
        return;
      }
      if (!validateConfig()) {
        showLoginError('replace SUPABASE_URL and SUPABASE_ANON_KEY in the source');
        return;
      }
      if (!window.supabase) {
        showLoginError('supabase library not loaded — check your connection and try again');
        return;
      }
      loginError.style.display = 'none';
      joinBtn.disabled = true;
      joinBtn.textContent = 'connecting…';
      try {
        currentUser = name;
        supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
        loginScreen.classList.add('hidden');
        app.classList.add('visible');
        headerUser.textContent = name;
        await loadHistory();
        subscribeRealtime();
        msgInput.focus();
      } catch (err) {
        joinBtn.disabled = false;
        joinBtn.textContent = 'join →';
        showLoginError('connection failed: ' + err.message);
      }
    }
  </script>
</body>
</html>
