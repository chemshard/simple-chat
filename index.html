<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>chat</title>
  <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet" />
  <script src="https://unpkg.com/@supabase/supabase-js@2/dist/umd/supabase.js"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg: #0c0c0c; --surface: #141414; --border: #252525;
      --text: #e8e4dc; --muted: #5a5650; --accent: #c9a84c;
      --accent-dim: #7a6028; --self-bg: #1a1710;
      --font: 'JetBrains Mono', ui-monospace, 'Courier New', monospace;
      --radius: 6px;
    }
    html, body { height: 100%; background: var(--bg); color: var(--text); font-family: var(--font); font-size: 13px; line-height: 1.6; -webkit-font-smoothing: antialiased; }

    #login-screen { position: fixed; inset: 0; display: flex; align-items: center; justify-content: center; background: var(--bg); z-index: 100; }
    #login-screen.hidden { display: none; }
    .login-box { width: 320px; border: 1px solid var(--border); border-radius: var(--radius); padding: 2rem; }
    .login-box h1 { font-size: 13px; font-weight: 500; letter-spacing: .08em; color: var(--accent); margin-bottom: 1.5rem; }
    .login-box label { display: block; font-size: 11px; color: var(--muted); letter-spacing: .06em; margin-bottom: 6px; }
    .login-box input { width: 100%; background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); color: var(--text); font-family: var(--font); font-size: 13px; padding: 8px 10px; outline: none; transition: border-color .15s; }
    .login-box input:focus { border-color: var(--accent-dim); }
    .login-box button { margin-top: 1.25rem; width: 100%; background: transparent; border: 1px solid var(--accent-dim); border-radius: var(--radius); color: var(--accent); font-family: var(--font); font-size: 12px; letter-spacing: .06em; padding: 8px; cursor: pointer; transition: background .15s, border-color .15s; }
    .login-box button:hover { background: var(--self-bg); border-color: var(--accent); }
    .login-box button:disabled { opacity: .5; cursor: default; }
    #login-error { margin-top: 10px; font-size: 11px; color: #c06060; display: none; white-space: pre-wrap; word-break: break-all; }

    #app { display: none; flex-direction: column; height: 100dvh; }
    #app.visible { display: flex; }
    header { display: flex; align-items: center; justify-content: space-between; padding: 14px 20px; border-bottom: 1px solid var(--border); flex-shrink: 0; }
    .header-left { display: flex; align-items: center; gap: 10px; }
    .dot { width: 7px; height: 7px; border-radius: 50%; background: var(--muted); flex-shrink: 0; }
    .dot.online { background: var(--accent); }
    header h2 { font-size: 12px; font-weight: 500; letter-spacing: .1em; color: var(--accent); }
    .header-user { font-size: 11px; color: var(--muted); letter-spacing: .05em; }

    #messages { flex: 1; overflow-y: auto; padding: 20px; display: flex; flex-direction: column; gap: 2px; scroll-behavior: smooth; }
    #messages::-webkit-scrollbar { width: 4px; }
    #messages::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }

    .msg { display: grid; grid-template-columns: 90px 1fr; gap: 0 14px; padding: 3px 0; border-radius: var(--radius); transition: background .1s; }
    .msg:hover { background: var(--surface); }
    .msg.self { background: var(--self-bg); }
    .msg-meta { display: flex; flex-direction: column; align-items: flex-end; padding: 3px 0 3px 10px; gap: 2px; }
    .msg-user { font-size: 11px; font-weight: 500; color: var(--accent); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; max-width: 88px; text-align: right; }
    .msg.self .msg-user { color: #8eb87a; }
    .msg-time { font-size: 10px; color: var(--muted); }
    .msg-body { padding: 3px 10px 3px 0; word-break: break-word; white-space: pre-wrap; }
    .date-divider { display: flex; align-items: center; gap: 10px; margin: 12px 0 8px; color: var(--muted); font-size: 10px; letter-spacing: .08em; }
    .date-divider::before, .date-divider::after { content: ''; flex: 1; height: 1px; background: var(--border); }
    .status-line { text-align: center; font-size: 11px; color: var(--muted); padding: 8px 0; }

    #input-area { border-top: 1px solid var(--border); padding: 14px 20px; display: flex; gap: 10px; align-items: flex-end; flex-shrink: 0; }
    #msg-input { flex: 1; background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); color: var(--text); font-family: var(--font); font-size: 13px; padding: 8px 10px; resize: none; outline: none; max-height: 120px; min-height: 36px; line-height: 1.6; transition: border-color .15s; }
    #msg-input:focus { border-color: var(--accent-dim); }
    #msg-input::placeholder { color: var(--muted); }
    #send-btn { background: transparent; border: 1px solid var(--accent-dim); border-radius: var(--radius); color: var(--accent); font-family: var(--font); font-size: 16px; width: 36px; height: 36px; flex-shrink: 0; cursor: pointer; display: flex; align-items: center; justify-content: center; transition: background .15s; }
    #send-btn:hover { background: var(--self-bg); border-color: var(--accent); }
    #send-btn:disabled { opacity: .3; cursor: default; }
  </style>
</head>
<body>

<div id="login-screen">
  <div class="login-box">
    <h1>// chat</h1>
    <label for="username-input">username</label>
    <input id="username-input" type="text" maxlength="24" placeholder="enter a name" autocomplete="off" autofocus />
    <p id="login-error"></p>
    <button id="join-btn">join &rarr;</button>
  </div>
</div>

<div id="app">
  <header>
    <div class="header-left">
      <div class="dot" id="status-dot"></div>
      <h2>chat</h2>
    </div>
    <span class="header-user" id="header-user"></span>
  </header>
  <div id="messages"><div class="status-line" id="loading-line">connecting&hellip;</div></div>
  <div id="input-area">
    <textarea id="msg-input" placeholder="message" maxlength="1000" rows="1" autocomplete="off"></textarea>
    <button id="send-btn" disabled>&#8593;</button>
  </div>
</div>

<script>
  // ── CONFIG — replace these two values ──────────────────
  const SUPABASE_URL      = 'https://uagbptlwxrmfdqtpbmwz.supabase.co';
  const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InVhZ2JwdGx3eHJtZmRxdHBibXd6Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODAyNzYyOTgsImV4cCI6MjA5NTg1MjI5OH0.oM94DGrGOng9x9XqQdxS-W8UkQRhRyMxAjcCxbhcdss';
  // ───────────────────────────────────────────────────────

  const loginScreen  = document.getElementById('login-screen');
  const usernameInput= document.getElementById('username-input');
  const joinBtn      = document.getElementById('join-btn');
  const loginError   = document.getElementById('login-error');
  const app          = document.getElementById('app');
  const headerUser   = document.getElementById('header-user');
  const statusDot    = document.getElementById('status-dot');
  const messagesEl   = document.getElementById('messages');
  const loadingLine  = document.getElementById('loading-line');
  const msgInput     = document.getElementById('msg-input');
  const sendBtn      = document.getElementById('send-btn');

  let client, currentUser, lastDate;

  function showError(msg) {
    loginError.textContent = msg;
    loginError.style.display = 'block';
    joinBtn.disabled = false;
    joinBtn.textContent = 'join \u2192';
  }

  joinBtn.addEventListener('click', join);
  usernameInput.addEventListener('keydown', e => { if (e.key === 'Enter') join(); });

  async function join() {
    const name = usernameInput.value.trim();
    if (!name) return showError('please enter a username');
    if (!window.supabase) return showError('supabase failed to load — check console');

    loginError.style.display = 'none';
    joinBtn.disabled = true;
    joinBtn.textContent = 'connecting\u2026';

    try {
      client = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
      currentUser = name;
      loginScreen.classList.add('hidden');
      app.classList.add('visible');
      headerUser.textContent = name;
      await loadHistory();
      subscribeRealtime();
      msgInput.focus();
    } catch (err) {
      showError('error: ' + err.message);
    }
  }

  function esc(s) {
    return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
  }
  function fmtTime(ts) {
    return new Date(ts).toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
  }
  function fmtDate(ts) {
    const d = new Date(ts), t = new Date();
    if (d.toDateString() === t.toDateString()) return 'today';
    const y = new Date(t); y.setDate(t.getDate() - 1);
    if (d.toDateString() === y.toDateString()) return 'yesterday';
    return d.toLocaleDateString([], { month: 'short', day: 'numeric', year: 'numeric' });
  }

  function appendMessage(msg) {
    const dateLabel = fmtDate(msg.created_at);
    if (dateLabel !== lastDate) {
      const d = document.createElement('div');
      d.className = 'date-divider';
      d.textContent = dateLabel;
      messagesEl.appendChild(d);
      lastDate = dateLabel;
    }
    const row = document.createElement('div');
    row.className = 'msg' + (msg.username === currentUser ? ' self' : '');
    row.innerHTML = `<div class="msg-meta"><span class="msg-user">${esc(msg.username)}</span><span class="msg-time">${fmtTime(msg.created_at)}</span></div><div class="msg-body">${esc(msg.content)}</div>`;
    messagesEl.appendChild(row);
  }

  async function loadHistory() {
    const { data, error } = await client
      .from('messages')
      .select('*')
      .order('created_at', { ascending: false })
      .limit(80);

    loadingLine && loadingLine.remove();

    if (error) {
      const e = document.createElement('div');
      e.className = 'status-line';
      e.style.color = '#c06060';
      e.textContent = 'load error: ' + error.message;
      messagesEl.appendChild(e);
      return;
    }
    if (!data.length) {
      const e = document.createElement('div');
      e.className = 'status-line';
      e.textContent = 'no messages yet';
      messagesEl.appendChild(e);
    } else {
      [...data].reverse().forEach(appendMessage);
    }
    messagesEl.scrollTop = messagesEl.scrollHeight;
  }

  function subscribeRealtime() {
    client.channel('public:messages')
      .on('postgres_changes', { event: 'INSERT', schema: 'public', table: 'messages' }, ({ new: msg }) => {
        const wasBottom = messagesEl.scrollHeight - messagesEl.clientHeight - messagesEl.scrollTop < 60;
        appendMessage(msg);
        if (wasBottom) messagesEl.scrollTop = messagesEl.scrollHeight;
      })
      .subscribe(status => {
        statusDot.classList.toggle('online', status === 'SUBSCRIBED');
      });
  }

  async function sendMessage() {
    const content = msgInput.value.trim();
    if (!content) return;
    sendBtn.disabled = true;
    msgInput.value = '';
    msgInput.style.height = 'auto';
    const { error } = await client.from('messages').insert({ username: currentUser, content });
    if (error) {
      msgInput.value = content;
      const e = document.createElement('div');
      e.className = 'status-line';
      e.style.color = '#c06060';
      e.textContent = 'send failed: ' + error.message;
      messagesEl.appendChild(e);
      messagesEl.scrollTop = messagesEl.scrollHeight;
    }
    sendBtn.disabled = false;
    msgInput.focus();
  }

  msgInput.addEventListener('input', () => {
    msgInput.style.height = 'auto';
    msgInput.style.height = Math.min(msgInput.scrollHeight, 120) + 'px';
    sendBtn.disabled = !msgInput.value.trim();
  });
  msgInput.addEventListener('keydown', e => {
    if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); if (!sendBtn.disabled) sendMessage(); }
  });
  sendBtn.addEventListener('click', sendMessage);
</script>
</body>
</html>
