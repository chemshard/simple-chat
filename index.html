<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>chat</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg: #0c0c0c; --surface: #141414; --border: #252525;
      --text: #e8e4dc; --muted: #5a5650; --accent: #c9a84c;
      --accent-dim: #7a6028; --self-bg: #1a1710;
      --font: Consolas, 'Cascadia Code', Menlo, 'Courier New', monospace;
      --radius: 6px;
    }
    html, body { height: 100%; background: var(--bg); color: var(--text); font-family: var(--font); font-size: 13px; line-height: 1.6; -webkit-font-smoothing: antialiased; }

    #login-screen { position: fixed; inset: 0; display: flex; align-items: center; justify-content: center; background: var(--bg); z-index: 100; }
    #login-screen.hidden { display: none; }
    .login-box { width: 320px; border: 1px solid var(--border); border-radius: var(--radius); padding: 2rem; }
    .login-box h1 { font-size: 13px; font-weight: 500; letter-spacing: .08em; color: var(--accent); margin-bottom: 1.5rem; }
    .login-box label { display: block; font-size: 11px; color: var(--muted); letter-spacing: .06em; margin-bottom: 6px; }
    .login-box input { width: 100%; background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); color: var(--text); font-family: var(--font); font-size: 13px; padding: 8px 10px; outline: none; transition: border-color .15s; }
    .login-box input:focus { border-color: var(--accent-dim); }
    .login-box button { margin-top: 1.25rem; width: 100%; background: transparent; border: 1px solid var(--accent-dim); border-radius: var(--radius); color: var(--accent); font-family: var(--font); font-size: 12px; letter-spacing: .06em; padding: 8px; cursor: pointer; transition: background .15s, border-color .15s; }
    .login-box button:hover { background: var(--self-bg); border-color: var(--accent); }
    .login-box button:disabled { opacity: .5; cursor: default; }
    #login-error { margin-top: 10px; font-size: 11px; color: #c06060; display: none; white-space: pre-wrap; word-break: break-all; }

    #app { display: none; flex-direction: column; height: 100dvh; }
    #app.visible { display: flex; }
    header { display: flex; align-items: center; justify-content: space-between; padding: 14px 20px; border-bottom: 1px solid var(--border); flex-shrink: 0; }
    .header-left { display: flex; align-items: center; gap: 10px; }
    .dot { width: 7px; height: 7px; border-radius: 50%; background: var(--muted); flex-shrink: 0; }
    .dot.online { background: var(--accent); }
    header h2 { font-size: 12px; font-weight: 500; letter-spacing: .1em; color: var(--accent); }
    .header-user { font-size: 11px; color: var(--muted); letter-spacing: .05em; }

    #messages { flex: 1; overflow-y: auto; padding: 20px; display: flex; flex-direction: column; gap: 2px; scroll-behavior: smooth; }
    #messages::-webkit-scrollbar { width: 4px; }
    #messages::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }

    .msg { display: grid; grid-template-columns: 90px 1fr; gap: 0 14px; padding: 3px 0; border-radius: var(--radius); transition: background .1s; }
    .msg:hover { background: var(--surface); }
    .msg.self { background: var(--self-bg); }
    .msg-meta { display: flex; flex-direction: column; align-items: flex-end; padding: 3px 0 3px 10px; gap: 2px; }
    .msg-user { font-size: 11px; font-weight: 500; color: var(--accent); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; max-width: 88px; text-align: right; }
    .msg.self .msg-user { color: #8eb87a; }
    .msg-time { font-size: 10px; color: var(--muted); }
    .msg-body { padding: 3px 10px 3px 0; word-break: break-word; white-space: pre-wrap; }
    .msg-body img { display: block; max-width: 280px; max-height: 320px; border-radius: var(--radius); margin-top: 4px; cursor: pointer; border: 1px solid var(--border); }
    .msg-body img:hover { border-color: var(--accent-dim); }

    .date-divider { display: flex; align-items: center; gap: 10px; margin: 12px 0 8px; color: var(--muted); font-size: 10px; letter-spacing: .08em; }
    .date-divider::before, .date-divider::after { content: ''; flex: 1; height: 1px; background: var(--border); }
    .status-line { text-align: center; font-size: 11px; color: var(--muted); padding: 8px 0; }

    #input-area { border-top: 1px solid var(--border); padding: 14px 20px; display: flex; gap: 8px; align-items: flex-end; flex-shrink: 0; }
    #msg-input { flex: 1; background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); color: var(--text); font-family: var(--font); font-size: 13px; padding: 8px 10px; resize: none; outline: none; max-height: 120px; min-height: 36px; line-height: 1.6; transition: border-color .15s; }
    #msg-input:focus { border-color: var(--accent-dim); }
    #msg-input::placeholder { color: var(--muted); }

    .icon-btn { background: transparent; border: 1px solid var(--border); border-radius: var(--radius); color: var(--muted); width: 36px; height: 36px; flex-shrink: 0; cursor: pointer; display: flex; align-items: center; justify-content: center; transition: background .15s, border-color .15s, color .15s; }
    .icon-btn:hover { border-color: var(--accent-dim); color: var(--accent); }
    .icon-btn:disabled { opacity: .3; cursor: default; }
    #send-btn { border-color: var(--accent-dim); color: var(--accent); font-size: 16px; }
    #send-btn:hover { background: var(--self-bg); border-color: var(--accent); }
    #file-input { display: none; }

    /* lightbox */
    #lightbox { display: none; position: fixed; inset: 0; background: rgba(0,0,0,.85); z-index: 200; align-items: center; justify-content: center; cursor: zoom-out; }
    #lightbox.open { display: flex; }
    #lightbox img { max-width: 90vw; max-height: 90vh; border-radius: var(--radius); }

    /* reply bar */
    .reply-bar { display: none; align-items: center; gap: 8px; padding: 8px 20px; background: var(--surface); border-top: 1px solid var(--border); font-size: 11px; color: var(--muted); flex-shrink: 0; }
    .reply-bar.active { display: flex; }
    .reply-bar-text { flex: 1; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
    .reply-bar-text strong { color: var(--accent); }
    .reply-cancel { background: none; border: none; color: var(--muted); cursor: pointer; font-size: 16px; padding: 0 4px; line-height: 1; }
    .reply-cancel:hover { color: var(--text); }

    /* reply quote */
    .msg-reply { background: var(--surface); border-left: 2px solid var(--accent-dim); border-radius: 3px; padding: 4px 8px; margin-bottom: 4px; font-size: 11px; color: var(--muted); }
    .msg-reply strong { color: var(--accent); display: block; margin-bottom: 2px; font-size: 10px; }
    .msg-reply span { white-space: nowrap; overflow: hidden; text-overflow: ellipsis; display: block; max-width: 400px; }

    /* message action buttons */
    .msg-actions { display: inline; position: relative; }
    .reply-btn, .edit-btn, .react-btn { display: none; background: none; border: 1px solid var(--border); border-radius: var(--radius); color: var(--muted); padding: 2px 6px; font-size: 10px; cursor: pointer; margin-top: 4px; margin-left: 4px; font-family: var(--font); letter-spacing: .04em; transition: color .12s, border-color .12s; }
    .reply-btn:hover, .edit-btn:hover, .react-btn:hover { color: var(--accent); border-color: var(--accent-dim); }
    .msg:hover .reply-btn,
    .msg:hover .react-btn { display: inline-block; }
    .msg.self:hover .edit-btn { display: inline-block; }

    /* edited tag */
    .edited-tag { font-size: 10px; color: var(--muted); margin-left: 4px; display: none; font-style: italic; }
    .edited-tag.visible { display: inline; }

    /* inline edit mode */
    .edit-textarea { width: 100%; background: var(--surface); border: 1px solid var(--accent-dim); border-radius: var(--radius); color: var(--text); font-family: var(--font); font-size: 13px; padding: 6px 8px; resize: none; outline: none; line-height: 1.6; margin-top: 4px; max-height: 120px; }
    .edit-textarea:focus { border-color: var(--accent); }
    .edit-actions { display: flex; gap: 6px; margin-top: 6px; }
    .edit-save, .edit-cancel-btn { background: transparent; border: 1px solid var(--border); border-radius: var(--radius); color: var(--muted); font-family: var(--font); font-size: 11px; padding: 3px 10px; cursor: pointer; letter-spacing: .04em; transition: background .15s, border-color .15s, color .15s; }
    .edit-save { border-color: var(--accent-dim); color: var(--accent); }
    .edit-save:hover { background: var(--self-bg); border-color: var(--accent); }
    .edit-cancel-btn:hover { color: var(--text); border-color: var(--muted); }
    .edit-save:disabled { opacity: .5; cursor: default; }

    /* emoji picker */
    .emoji-picker { position: absolute; bottom: calc(100% + 4px); left: 0; background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); padding: 6px; display: flex; gap: 4px; flex-wrap: wrap; z-index: 50; box-shadow: 0 4px 16px rgba(0,0,0,.5); }
    .emoji-opt { background: none; border: none; font-size: 17px; cursor: pointer; padding: 3px 4px; border-radius: 4px; line-height: 1; transition: background .1s; }
    .emoji-opt:hover { background: var(--border); }

    /* reaction pills */
    .reactions { display: flex; flex-wrap: wrap; gap: 4px; margin-top: 5px; white-space: normal; }
    .reaction-pill { background: var(--surface); border: 1px solid var(--border); border-radius: 20px; padding: 1px 7px; font-size: 12px; cursor: pointer; color: var(--text); transition: border-color .12s, background .12s; line-height: 1.6; }
    .reaction-pill:hover { border-color: var(--accent-dim); }
    .reaction-pill.mine { border-color: var(--accent-dim); background: var(--self-bg); }
  </style>
</head>
<body>

<div id="login-screen">
  <div class="login-box">
    <h1>// chat</h1>
    <label for="username-input">username</label>
    <input id="username-input" type="text" maxlength="24" placeholder="enter a name" autocomplete="off" autofocus />
    <p id="login-error"></p>
    <button id="join-btn">join &rarr;</button>
  </div>
</div>

<div id="app">
  <header>
    <div class="header-left">
      <div class="dot" id="status-dot"></div>
      <h2>chat</h2>
    </div>
    <span class="header-user" id="header-user"></span>
  </header>
  <div id="messages"><div class="status-line" id="loading-line">connecting&hellip;</div></div>
  <div id="reply-bar" class="reply-bar">
    <span class="reply-bar-text">&#x21A9; replying to <strong id="reply-bar-user"></strong>: <span id="reply-bar-preview"></span></span>
    <button class="reply-cancel" id="reply-cancel" title="cancel reply">&#x2715;</button>
  </div>
  <div id="input-area">
    <input id="file-input" type="file" accept="image/*" />
    <button class="icon-btn" id="img-btn" title="send image">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="3" width="18" height="18" rx="2"/><circle cx="8.5" cy="8.5" r="1.5"/><polyline points="21 15 16 10 5 21"/></svg>
    </button>
    <textarea id="msg-input" placeholder="message  (or /clear to wipe chat)" maxlength="1000" rows="1" autocomplete="off"></textarea>
    <button class="icon-btn" id="send-btn" disabled title="send (Enter)">&#8593;</button>
  </div>
</div>

<div id="lightbox"><img id="lightbox-img" src="" alt="" /></div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script>
  // CONFIG
  const SUPABASE_URL      = 'https://uagbptlwxrmfdqtpbmwz.supabase.co';
  const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InVhZ2JwdGx3eHJtZmRxdHBibXd6Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODAyNzYyOTgsImV4cCI6MjA5NTg1MjI5OH0.oM94DGrGOng9x9XqQdxS-W8UkQRhRyMxAjcCxbhcdss';
  const IMAGE_BUCKET      = 'chat-images';
  const IMG_PREFIX        = 'img::';
  const CLEAR_MSG         = '__clear__';
  const EMOJIS            = ['👍','👎','❤️','😂','😮','😢','🔥','💯'];

  const loginScreen   = document.getElementById('login-screen');
  const usernameInput = document.getElementById('username-input');
  const joinBtn       = document.getElementById('join-btn');
  const loginError    = document.getElementById('login-error');
  const app           = document.getElementById('app');
  const headerUser    = document.getElementById('header-user');
  const statusDot     = document.getElementById('status-dot');
  const messagesEl    = document.getElementById('messages');
  const msgInput      = document.getElementById('msg-input');
  const sendBtn       = document.getElementById('send-btn');
  const imgBtn        = document.getElementById('img-btn');
  const fileInput     = document.getElementById('file-input');
  const lightbox      = document.getElementById('lightbox');
  const lightboxImg   = document.getElementById('lightbox-img');

  let client, currentUser, lastDate;
  let replyingTo = null;
  const msgMap       = new Map(); // id -> msg object
  const domMap       = new Map(); // id -> row element
  const reactionsMap = new Map(); // message_id -> Map(emoji -> Set(username))

  // ── Auth ───────────────────────────────────────────────
  function showError(msg) {
    loginError.textContent = msg;
    loginError.style.display = 'block';
    joinBtn.disabled = false;
    joinBtn.textContent = 'join \u2192';
  }

  joinBtn.addEventListener('click', join);
  usernameInput.addEventListener('keydown', e => { if (e.key === 'Enter') join(); });

  async function join() {
    const name = usernameInput.value.trim();
    if (!name) return showError('please enter a username');
    if (!window.supabase) return showError('supabase failed to load — check console');
    loginError.style.display = 'none';
    joinBtn.disabled = true;
    joinBtn.textContent = 'connecting\u2026';
    try {
      client = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
      currentUser = name;
      loginScreen.classList.add('hidden');
      app.classList.add('visible');
      headerUser.textContent = name;
      await loadHistory();
      subscribeRealtime();
      subscribePresence();
      msgInput.focus();
    } catch (err) {
      showError('error: ' + err.message);
    }
  }

  // ── Helpers ────────────────────────────────────────────
  function esc(s) { return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }
  function fmtTime(ts) { return new Date(ts).toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' }); }
  function fmtDate(ts) {
    const d = new Date(ts), t = new Date();
    if (d.toDateString() === t.toDateString()) return 'today';
    const y = new Date(t); y.setDate(t.getDate() - 1);
    if (d.toDateString() === y.toDateString()) return 'yesterday';
    return d.toLocaleDateString([], { month: 'short', day: 'numeric', year: 'numeric' });
  }
  function scrollToBottom() { messagesEl.scrollTop = messagesEl.scrollHeight; }
  function nearBottom() { return messagesEl.scrollHeight - messagesEl.clientHeight - messagesEl.scrollTop < 60; }

  function statusLine(text, color) {
    const e = document.createElement('div');
    e.className = 'status-line';
    if (color) e.style.color = color;
    e.textContent = text;
    messagesEl.appendChild(e);
    scrollToBottom();
    return e;
  }

  // ── Tab notifications ──────────────────────────────────
  let unread = 0;
  const baseTitle = document.title;

  document.addEventListener('visibilitychange', () => {
    if (!document.hidden) { unread = 0; document.title = baseTitle; }
  });

  function bumpUnread() {
    if (document.hidden) {
      unread++;
      document.title = '(' + unread + ') ' + baseTitle;
    }
  }

  // ── Render message ─────────────────────────────────────
  function appendMessage(msg) {
    if (msg.message === CLEAR_MSG) {
      clearUI();
      if (msg.username === currentUser) deleteAllMessages();
      return;
    }

    if (msg.id) msgMap.set(msg.id, msg);

    const dateLabel = fmtDate(msg.created_at);
    if (dateLabel !== lastDate) {
      const d = document.createElement('div');
      d.className = 'date-divider';
      d.textContent = dateLabel;
      messagesEl.appendChild(d);
      lastDate = dateLabel;
    }

    const isImg  = msg.message.startsWith(IMG_PREFIX);
    const isSelf = msg.username === currentUser;
    const row    = document.createElement('div');
    row.className = 'msg' + (isSelf ? ' self' : '');

    let bodyHtml = '';

    if (msg.reply_to_id) {
      const orig = msgMap.get(msg.reply_to_id);
      if (orig) {
        const preview = orig.message.startsWith(IMG_PREFIX) ? '[image]' : esc(orig.message).slice(0, 80);
        bodyHtml += '<div class="msg-reply"><strong>\u21A9 ' + esc(orig.username) + '</strong><span>' + preview + '</span></div>';
      } else {
        bodyHtml += '<div class="msg-reply"><strong>\u21A9 original message</strong><span>[unavailable]</span></div>';
      }
    }

    if (isImg) {
      bodyHtml += '<img src="' + esc(msg.message.slice(IMG_PREFIX.length)) + '" alt="image" loading="lazy" />';
    } else {
      bodyHtml += '<span class="msg-text">' + esc(msg.message) + '</span><span class="edited-tag">edited</span>';
    }

    bodyHtml += '<div class="msg-actions" style="position:relative">';
    bodyHtml += '<button class="reply-btn">\u21A9 reply</button>';
    if (isSelf && !isImg) bodyHtml += '<button class="edit-btn">\u270E edit</button>';
    bodyHtml += '<button class="react-btn">+ react</button>';
    bodyHtml += '</div>';

    row.innerHTML =
      '<div class="msg-meta">' +
        '<span class="msg-user">' + esc(msg.username) + '</span>' +
        '<span class="msg-time">' + fmtTime(msg.created_at) + '</span>' +
      '</div>' +
      '<div class="msg-body">' + bodyHtml + '</div>';

    messagesEl.appendChild(row);
    if (msg.id) domMap.set(msg.id, row);

    if (isImg) {
      row.querySelector('img').addEventListener('click', e => {
        lightboxImg.src = e.target.src;
        lightbox.classList.add('open');
      });
    }

    row.querySelector('.reply-btn').addEventListener('click', () => setReply(msg));

    if (isSelf && !isImg && msg.id) {
      row.querySelector('.edit-btn').addEventListener('click', () => startEdit(msg, row));
    }

    if (msg.id) {
      row.querySelector('.react-btn').addEventListener('click', e => {
        e.stopPropagation();
        openPicker(msg.id, row.querySelector('.msg-actions'));
      });
    }
  }

  lightbox.addEventListener('click', () => lightbox.classList.remove('open'));

  // ── Emoji picker ───────────────────────────────────────
  function openPicker(msgId, actionsEl) {
    document.querySelector('.emoji-picker')?.remove();
    const picker = document.createElement('div');
    picker.className = 'emoji-picker';
    EMOJIS.forEach(emoji => {
      const btn = document.createElement('button');
      btn.className = 'emoji-opt';
      btn.textContent = emoji;
      btn.addEventListener('click', e => {
        e.stopPropagation();
        toggleReaction(msgId, emoji);
        picker.remove();
      });
      picker.appendChild(btn);
    });
    actionsEl.appendChild(picker);
    setTimeout(() => document.addEventListener('click', () => picker.remove(), { once: true }), 0);
  }

  // ── Reactions data ─────────────────────────────────────
  function getReactionMap(msgId) {
    if (!reactionsMap.has(msgId)) reactionsMap.set(msgId, new Map());
    return reactionsMap.get(msgId);
  }

  function applyReaction(msgId, emoji, username, add) {
    const r = getReactionMap(msgId);
    if (add) {
      if (!r.has(emoji)) r.set(emoji, new Set());
      r.get(emoji).add(username);
    } else {
      if (r.has(emoji)) {
        r.get(emoji).delete(username);
        if (r.get(emoji).size === 0) r.delete(emoji);
      }
    }
    renderReactions(msgId);
  }

  function renderReactions(msgId) {
    const row = domMap.get(msgId);
    if (!row) return;
    const r = getReactionMap(msgId);
    let el = row.querySelector('.reactions');
    if (!el) {
      el = document.createElement('div');
      el.className = 'reactions';
      row.querySelector('.msg-body').appendChild(el);
    }
    el.innerHTML = '';
    for (const [emoji, users] of r) {
      if (!users.size) continue;
      const pill = document.createElement('button');
      pill.className = 'reaction-pill' + (users.has(currentUser) ? ' mine' : '');
      pill.textContent = emoji + '\u2009' + users.size;
      pill.title = [...users].join(', ');
      pill.addEventListener('click', () => toggleReaction(msgId, emoji));
      el.appendChild(pill);
    }
  }

  async function toggleReaction(msgId, emoji) {
    const r     = getReactionMap(msgId);
    const users = r.get(emoji);
    const hasIt = users && users.has(currentUser);
    if (hasIt) {
      await client.from('reactions').delete()
        .eq('message_id', msgId).eq('username', currentUser).eq('emoji', emoji);
    } else {
      await client.from('reactions').insert({ message_id: msgId, username: currentUser, emoji });
    }
  }

  async function loadReactions(messageIds) {
    if (!messageIds.length) return;
    const { data, error } = await client.from('reactions').select('*').in('message_id', messageIds);
    if (error || !data) return;
    data.forEach(r => applyReaction(r.message_id, r.emoji, r.username, true));
  }

  // ── Edit message ───────────────────────────────────────
  function startEdit(msg, row) {
    const bodyEl    = row.querySelector('.msg-body');
    const textEl    = bodyEl.querySelector('.msg-text');
    const actionsEl = bodyEl.querySelector('.msg-actions');
    const editedTag = bodyEl.querySelector('.edited-tag');
    if (!textEl || bodyEl.querySelector('.edit-textarea')) return;

    const original = msg.message;
    textEl.style.display = 'none';
    if (editedTag) editedTag.style.display = 'none';
    actionsEl.style.display = 'none';

    const ta = document.createElement('textarea');
    ta.className = 'edit-textarea';
    ta.value = original;
    ta.rows = 1;
    ta.maxLength = 1000;
    bodyEl.insertBefore(ta, actionsEl);

    ta.style.height = 'auto';
    ta.style.height = Math.min(ta.scrollHeight, 120) + 'px';
    ta.addEventListener('input', () => {
      ta.style.height = 'auto';
      ta.style.height = Math.min(ta.scrollHeight, 120) + 'px';
    });

    const btnRow = document.createElement('div');
    btnRow.className = 'edit-actions';
    btnRow.innerHTML = '<button class="edit-save">save</button><button class="edit-cancel-btn">cancel</button>';
    bodyEl.insertBefore(btnRow, actionsEl);

    const saveBtn   = btnRow.querySelector('.edit-save');
    const cancelBtn = btnRow.querySelector('.edit-cancel-btn');

    ta.focus();
    ta.setSelectionRange(ta.value.length, ta.value.length);

    function closeEdit() {
      ta.remove(); btnRow.remove();
      textEl.style.display = '';
      if (editedTag) editedTag.style.display = '';
      actionsEl.style.display = '';
    }

    cancelBtn.addEventListener('click', closeEdit);
    ta.addEventListener('keydown', e => {
      if (e.key === 'Escape') { e.preventDefault(); closeEdit(); }
      if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); saveBtn.click(); }
    });

    saveBtn.addEventListener('click', async () => {
      const newText = ta.value.trim();
      if (!newText || newText === original) { closeEdit(); return; }
      saveBtn.disabled = true;
      saveBtn.textContent = 'saving\u2026';
      const { error } = await client.from('messages').update({ message: newText }).eq('id', msg.id);
      if (error) {
        saveBtn.disabled = false;
        saveBtn.textContent = 'save';
        statusLine('edit failed: ' + error.message, '#c06060');
        return;
      }
      msg.message = newText;
      msgMap.set(msg.id, msg);
      textEl.textContent = newText;
      if (editedTag) editedTag.classList.add('visible');
      closeEdit();
    });
  }

  function applyEdit(updatedMsg) {
    msgMap.set(updatedMsg.id, updatedMsg);
    const row = domMap.get(updatedMsg.id);
    if (!row) return;
    const textEl    = row.querySelector('.msg-text');
    const editedTag = row.querySelector('.edited-tag');
    const ta        = row.querySelector('.edit-textarea');
    const btnRow    = row.querySelector('.edit-actions');
    if (ta)     ta.remove();
    if (btnRow) btnRow.remove();
    if (textEl) { textEl.style.display = ''; textEl.textContent = updatedMsg.message; }
    row.querySelector('.msg-actions').style.display = '';
    if (editedTag) { editedTag.style.display = ''; editedTag.classList.add('visible'); }
  }

  // ── Reply bar ──────────────────────────────────────────
  const replyBar     = document.getElementById('reply-bar');
  const replyBarUser = document.getElementById('reply-bar-user');
  const replyBarPrev = document.getElementById('reply-bar-preview');
  document.getElementById('reply-cancel').addEventListener('click', clearReply);

  function setReply(msg) {
    replyingTo = msg;
    replyBarUser.textContent = msg.username;
    replyBarPrev.textContent = msg.message.startsWith(IMG_PREFIX) ? '[image]' : msg.message.slice(0, 60);
    replyBar.classList.add('active');
    msgInput.focus();
  }

  function clearReply() {
    replyingTo = null;
    replyBar.classList.remove('active');
  }

  // ── Clear ──────────────────────────────────────────────
  function clearUI() {
    messagesEl.innerHTML = '';
    lastDate = null;
    msgMap.clear();
    domMap.clear();
    reactionsMap.clear();
    statusLine('chat cleared');
  }

  async function deleteAllMessages() {
    const { data: imgMsgs, error: fetchErr } = await client
      .from('messages').select('message').like('message', IMG_PREFIX + '%');
    if (fetchErr) console.error('fetch img msgs failed:', fetchErr);
    if (imgMsgs && imgMsgs.length) {
      const paths = imgMsgs.map(row => {
        const url = row.message.slice(IMG_PREFIX.length);
        const marker = '/object/public/' + IMAGE_BUCKET + '/';
        const idx = url.indexOf(marker);
        return idx !== -1 ? url.slice(idx + marker.length) : null;
      }).filter(Boolean);
      if (paths.length) await client.storage.from(IMAGE_BUCKET).remove(paths);
    }
    await client.from('messages').delete().gte('id', 0);
  }

  // ── Load history ───────────────────────────────────────
  async function loadHistory() {
    const { data, error } = await client
      .from('messages').select('*')
      .order('created_at', { ascending: false }).limit(80);

    document.getElementById('loading-line')?.remove();
    if (error) { statusLine('load error: ' + error.message, '#c06060'); return; }
    if (!data.length) { statusLine('no messages yet'); return; }
    [...data].reverse().forEach(appendMessage);
    scrollToBottom();

    const ids = data.map(m => m.id).filter(Boolean);
    await loadReactions(ids);
  }

  // ── Realtime ───────────────────────────────────────────
  function subscribeRealtime() {
    client.channel('public:messages')
      .on('postgres_changes', { event: 'INSERT', schema: 'public', table: 'messages' }, ({ new: msg }) => {
        const snap = nearBottom();
        appendMessage(msg);
        if (snap) scrollToBottom();
        if (msg.username !== currentUser && msg.message !== CLEAR_MSG) bumpUnread();
      })
      .on('postgres_changes', { event: 'UPDATE', schema: 'public', table: 'messages' }, ({ new: msg }) => {
        applyEdit(msg);
      })
      .subscribe(status => {
        statusDot.classList.toggle('online', status === 'SUBSCRIBED');
      });

    client.channel('public:reactions')
      .on('postgres_changes', { event: 'INSERT', schema: 'public', table: 'reactions' }, ({ new: r }) => {
        applyReaction(r.message_id, r.emoji, r.username, true);
      })
      .on('postgres_changes', { event: 'DELETE', schema: 'public', table: 'reactions' }, ({ old: r }) => {
        applyReaction(r.message_id, r.emoji, r.username, false);
      })
      .subscribe();
  }

  // ── Presence (join / leave) ────────────────────────────
  function subscribePresence() {
    const presence = client.channel('chat-presence');
    presence
      .on('presence', { event: 'join' }, ({ newPresences }) => {
        newPresences.forEach(p => {
          if (p.username !== currentUser) statusLine('\u2192 ' + p.username + ' joined', '#8eb87a');
        });
      })
      .on('presence', { event: 'leave' }, ({ leftPresences }) => {
        leftPresences.forEach(p => statusLine('\u2190 ' + p.username + ' left'));
      })
      .subscribe(async status => {
        if (status === 'SUBSCRIBED') await presence.track({ username: currentUser });
      });
  }

  // ── Send text ──────────────────────────────────────────
  async function sendMessage() {
    const content = msgInput.value.trim();
    if (!content) return;
    msgInput.value = '';
    msgInput.style.height = 'auto';
    sendBtn.disabled = true;

    if (content === '/clear') {
      await client.from('messages').insert({ username: currentUser, message: CLEAR_MSG });
      sendBtn.disabled = false;
      msgInput.focus();
      return;
    }

    const payload = { username: currentUser, message: content };
    if (replyingTo) payload.reply_to_id = replyingTo.id;
    clearReply();

    const { error } = await client.from('messages').insert(payload);
    if (error) { msgInput.value = content; statusLine('send failed: ' + error.message, '#c06060'); }
    sendBtn.disabled = false;
    msgInput.focus();
  }

  // ── Send image ─────────────────────────────────────────
  imgBtn.addEventListener('click', () => fileInput.click());

  fileInput.addEventListener('change', async () => {
    const file = fileInput.files[0];
    if (!file) return;
    fileInput.value = '';

    const ext  = file.name.split('.').pop();
    const path = Date.now() + '-' + Math.random().toString(36).slice(2) + '.' + ext;
    const placeholder = statusLine('\u23F3 uploading image\u2026');

    const { error: uploadErr } = await client.storage
      .from(IMAGE_BUCKET).upload(path, file, { contentType: file.type });

    if (uploadErr) {
      placeholder.textContent = 'upload failed: ' + uploadErr.message;
      placeholder.style.color = '#c06060';
      return;
    }

    const { data: urlData } = client.storage.from(IMAGE_BUCKET).getPublicUrl(path);
    placeholder.remove();

    const payload = { username: currentUser, message: IMG_PREFIX + urlData.publicUrl };
    if (replyingTo) payload.reply_to_id = replyingTo.id;
    clearReply();

    const { error: msgErr } = await client.from('messages').insert(payload);
    if (msgErr) statusLine('failed to send image: ' + msgErr.message, '#c06060');
  });

  // ── Input handling ─────────────────────────────────────
  msgInput.addEventListener('input', () => {
    msgInput.style.height = 'auto';
    msgInput.style.height = Math.min(msgInput.scrollHeight, 120) + 'px';
    sendBtn.disabled = !msgInput.value.trim();
  });
  msgInput.addEventListener('keydown', e => {
    if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); if (!sendBtn.disabled) sendMessage(); }
  });
  sendBtn.addEventListener('click', sendMessage);
</script>
</body>
</html>
